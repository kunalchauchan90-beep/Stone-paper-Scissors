<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSORS GAME</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <H1>ROCK PAPER SCISSORS</H1>
    <div class="choices">
        <div class="choice" id="ROCK">
            <img src="https://tse4.mm.bing.net/th/id/OIP._g6CNrSZRpleevjgKXbiQwAAAA?pid=Api&P=0&h=180" alt="ROCK">
        </div>
        <div class="choice" id="paper">
            <img src="https://tse1.mm.bing.net/th/id/OIP.nBbSpkb3vSVUUvyY8pO5IAHaHa?pid=Api&P=0&h=180" alt="PAPER">
        </div>
        <div class="choice" id="scissors">
            <img src="https://tse2.mm.bing.net/th/id/OIP.3FK64ZHEPV6LF76QFhyecAAAAA?pid=Api&P=0&h=180" alt="SCISSORS">
        </div>

    </div>

    <div class="score-board">
        <div class="score">
            <p id="user-score">0</p>
            <p>you</p>
        </div>
        <div class="score">
            <p id="comp-score">0</p>
            <p>comp</p>
        </div>
        </div>
        <div class="msg-container">
            <p id="msg">play your move</p>
        </div>
    <script src="sps.js"></script>
</body>

</html>
